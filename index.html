<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>OH26 自動化ダッシュボード</title>
<style>
  :root {
    --bg: #fafaf8; --fg: #1a1a1a; --muted: #6b6b6b; --line: #e3e1dc;
    --card: #ffffff; --ok: #1a7f4b; --ng: #b3261e; --accent: #4a5568;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #16181d; --fg: #e8e6e3; --muted: #9a9891; --line: #32353c;
            --card: #1e2128; --ok: #4cc38a; --ng: #ff8177; --accent: #a3b3cc; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px 16px; background: var(--bg); color: var(--fg);
         font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", system-ui, sans-serif; }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; }
  .gen { color: var(--muted); font-size: .8rem; margin-bottom: 20px; }
  .links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .links a { display: inline-block; padding: 8px 14px; border: 1px solid var(--line);
             border-radius: 8px; background: var(--card); color: var(--fg);
             text-decoration: none; font-size: .9rem; }
  .links a:hover { border-color: var(--accent); }
  .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  select, input[type=password] { padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
           background: var(--card); color: var(--fg); font-size: .95rem; }
  button { padding: 8px 18px; border: 1px solid var(--accent); border-radius: 8px;
           background: var(--accent); color: #fff; font-size: .95rem; cursor: pointer; }
  .tblwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; background: var(--card); }
  table { border-collapse: collapse; width: 100%; min-width: 640px; font-size: .85rem; }
  th, td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; }
  tbody th { text-align: left; font-weight: 600; color: var(--fg); }
  tbody tr:last-child th, tbody tr:last-child td { border-bottom: none; }
  .sched { display: block; color: var(--muted); font-weight: 400; font-size: .75rem; }
  .ok { color: var(--ok); } .ng { color: var(--ng); font-weight: 700; }
  .dim { color: var(--muted); }
  .today { background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .legend { color: var(--muted); font-size: .78rem; margin-top: 10px; }
  #resident { margin-top: 18px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  #resident .rlabel { color: var(--muted); font-size: .82rem; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1px solid var(--line);
          border-radius: 999px; background: var(--card); font-size: .82rem; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
  #gate { max-width: 380px; margin: 15vh auto 0; text-align: center; }
  #gate .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 28px 24px; }
  #gate input { width: 100%; margin: 14px 0; }
  #gateErr { color: var(--ng); font-size: .85rem; min-height: 1.2em; }
  #app { display: none; }
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <h1>🔒 OH26 ダッシュボード</h1>
    <p class="gen">パスワードを入力してください</p>
    <form id="gateForm">
      <input type="password" id="pw" autocomplete="current-password" autofocus>
      <div id="gateErr"></div>
      <button type="submit">開く</button>
    </form>
  </div>
</div>

<div class="wrap" id="app">
  <h1>OH26 自動化ダッシュボード</h1>
  <div class="gen" id="gen"></div>
  <div class="links" id="links"></div>
  <div class="bar">
    <label for="week">表示週:</label>
    <select id="week"></select>
  </div>
  <div class="tblwrap"><table id="grid"></table></div>
  <div class="legend">✅ 成功 ／ ❌ 失敗（ホバーで時刻・所要分）／ ・ 実行なし。時刻はPCのローカル時刻。</div>
  <div id="resident"></div>
</div>
<script>
const DAYS = ["月","火","水","木","金","土","日"];
const pad = n => String(n).padStart(2, "0");
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

function mondayOf(d) {
  const x = new Date(d); const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow); x.setHours(0,0,0,0); return x;
}

async function decrypt(enc, password) {
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(enc.salt), iterations: enc.iter, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64(enc.iv) }, key, b64(enc.data));
  return JSON.parse(new TextDecoder().decode(plain));
}

async function tryOpen(password) {
  const enc = await (await fetch("data.enc.json?_=" + Date.now())).json();
  const data = await decrypt(enc, password);   // 失敗すると例外
  localStorage.setItem("oh26pw", password);
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  render(data);
}

function render(data) {
  document.getElementById("gen").textContent = "最終更新: " + data.generated;
  const links = document.getElementById("links");
  links.innerHTML = "";
  for (const l of data.links) {
    const a = document.createElement("a");
    a.href = l.url; a.textContent = l.label + " ↗"; a.target = "_blank"; a.rel = "noopener";
    links.appendChild(a);
  }

  const byDay = {};
  for (const r of data.runs) {
    const day = r.start.slice(0, 10);
    (byDay[day] ??= {});
    (byDay[day][r.job] ??= []).push(r);
  }

  const sel = document.getElementById("week");
  sel.innerHTML = "";
  const thisMon = mondayOf(new Date());
  const weeks = [];
  const oldest = data.runs.length ? mondayOf(new Date(data.runs[0].start)) : thisMon;
  for (let m = new Date(thisMon), i = 0; m >= oldest || i < 6; m.setDate(m.getDate()-7), i++) {
    weeks.push(new Date(m));
    if (i > 26) break;
  }
  weeks.forEach((m, i) => {
    const end = new Date(m); end.setDate(end.getDate()+6);
    const o = document.createElement("option");
    o.value = ymd(m);
    o.textContent = `${ymd(m).slice(5).replace("-","/")} 〜 ${ymd(end).slice(5).replace("-","/")}` + (i===0 ? "（今週）" : "");
    sel.appendChild(o);
  });
  sel.onchange = () => renderGrid(new Date(sel.value), data, byDay);
  renderGrid(thisMon, data, byDay);

  const res = document.getElementById("resident");
  const residents = data.resident || [];
  if (residents.length) {
    res.innerHTML = `<span class="rlabel">常時稼働:</span>` + residents.map(r =>
      `<span class="chip"><span class="dot"></span>${r.label}${r.note ? `<span class="dim">（${r.note}）</span>` : ""}</span>`
    ).join("");
  } else {
    res.innerHTML = "";
  }
}

function renderGrid(mon, data, byDay) {
  const grid = document.getElementById("grid");
  const today = ymd(new Date());
  const dates = [...Array(7)].map((_, i) => { const d = new Date(mon); d.setDate(d.getDate()+i); return d; });
  let html = "<thead><tr><th>ジョブ</th>";
  for (const [i, d] of dates.entries()) {
    html += `<th class="${ymd(d)===today?"today":""}">${DAYS[i]}<br>${d.getMonth()+1}/${d.getDate()}</th>`;
  }
  html += "</tr></thead><tbody>";
  for (const job of data.jobs) {
    html += `<tr><th>${job.label}<span class="sched">${job.schedule}</span></th>`;
    for (const d of dates) {
      const runs = (byDay[ymd(d)] || {})[job.id] || [];
      let cell = `<span class="dim">・</span>`;
      if (runs.length) {
        const okCount = runs.filter(r => r.exit === 0).length;
        const ngCount = runs.filter(r => r.exit !== 0 && r.exit !== null).length;
        const parts = [];
        if (okCount) parts.push(`<span class="ok" title="${okCount}回成功">✅${okCount > 1 ? "×" + okCount : ""}</span>`);
        if (ngCount) parts.push(`<span class="ng" title="${ngCount}回失敗">❌${ngCount > 1 ? "×" + ngCount : ""}</span>`);
        cell = parts.join(" ") || cell;
      }
      html += `<td class="${ymd(d)===today?"today":""}">${cell}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody>";
  grid.innerHTML = html;
}

document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  try { await tryOpen(pw); }
  catch { document.getElementById("gateErr").textContent = "パスワードが違います"; }
});

// 保存済みパスワードで自動オープン
const saved = localStorage.getItem("oh26pw");
if (saved) {
  tryOpen(saved).catch(() => { localStorage.removeItem("oh26pw"); });
}
</script>
</body>
</html>
